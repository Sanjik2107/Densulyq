services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: densaulyq
      POSTGRES_USER: densaulyq
      POSTGRES_PASSWORD: densaulyq
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U densaulyq -d densaulyq"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://densaulyq:densaulyq@postgres:5432/densaulyq?sslmode=disable
      CORS_ORIGINS: "*"
      SESSION_TTL_HOURS: "24"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"

volumes:
  postgres_data:
